<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <meta name="author" content="Jackson Hu" />

  <title>Jackson Hu · AIPM Resume</title>

  <script>
    /* Inline anti-flash theme bootstrap. Resolves auto -> light/dark before CSS loads. */
    (function () {
      try {
        var saved = localStorage.getItem('resume-theme') || 'auto';
        var real = saved;
        if (saved === 'auto') {
          var h = new Date().getHours();
          real = (h >= 7 && h < 19) ? 'light' : 'dark';
        }
        document.documentElement.dataset.theme = real;
        document.documentElement.dataset.themeMode = saved;
      } catch (e) {
        document.documentElement.dataset.theme = 'dark';
        document.documentElement.dataset.themeMode = 'auto';
      }
    })();
    (function () {
      try {
        var loc = localStorage.getItem('resume-locale');
        if (loc === 'en' || loc === 'ja' || loc === 'zh-CN') {
          document.documentElement.lang = loc === 'zh-CN' ? 'zh-CN' : loc === 'ja' ? 'ja' : 'en';
          document.documentElement.setAttribute('data-locale', loc);
        }
      } catch (e) { /* noop */ }
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;600&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

  <div class="bg-decor" aria-hidden="true">

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

        id="btn-lang"
        class="action-btn ghost"

      <div id="lang-menu" class="lang-menu" role="menu" hidden>
        <button type="button" class="lang-menu-item" role="menuitem" data-locale="zh-CN">中文</button>
        <button type="button" class="lang-menu-item" role="menuitem" data-locale="en">English</button>
        <button type="button" class="lang-menu-item" role="menuitem" data-locale="ja">日本語</button>
      </div>
    </div>
    <button
      id="btn-widgets"
      class="action-btn ghost"
      type="button"
      data-i18n-title="actions.widgetsTitle"
      title="打开侧边小组件（天气、联系方式等）"
      data-i18n-aria="actions.widgetsAria"

      aria-controls="rightbar"
    >
      <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">

      <span class="theme-icon" aria-hidden="true">⚙️</span>

      </svg>

  <aside id="rightbar" data-i18n-aria="rightbar.asideAria" aria-label="侧边小组件">

      <div class="widget-loading">…</div>

    <section class="widget widget-weather" id="w-weather" data-i18n-aria="rightbar.weatherAria" aria-label="天气预报">
      <div class="widget-head widget-head--weather">
        <span class="widget-eyebrow" data-i18n="widgets.eyebrowWeather">WEATHER</span>

            data-i18n-aria="weather.refreshAria"

              />

    <section class="widget widget-theme-card" id="w-theme" data-i18n-aria="rightbar.themeAria" aria-label="主题模式">

    <section class="widget widget-radar" id="w-radar" data-i18n-aria="rightbar.radarAria" aria-label="技能雷达图">
